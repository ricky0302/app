<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>タップでポン！</title>
  <style>
    /* 画面の基本設定（誤操作やテキスト選択を防止） */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf5e6;
      transition: background-color 0.3s ease, background-image 0.3s ease;
      touch-action: none; /* ダブルタップズームなどを無効化 */
      -webkit-user-select: none;
      user-select: none;
      font-family: sans-serif;
      position: relative;
    }

    .fireworks-active {
      background-image: radial-gradient(circle at 20% 20%, rgba(255,255,210,0.9) 0 10%, transparent 25%),
                        radial-gradient(circle at 80% 25%, rgba(255,190,240,0.9) 0 8%, transparent 22%),
                        radial-gradient(circle at 50% 70%, rgba(180,230,255,0.9) 0 12%, transparent 28%);
      background-blend-mode: screen;
    }

    .firework-shot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 48px rgba(255,180,60,0.85), 0 0 80px rgba(255,255,255,0.6);
      animation: fireworkShot var(--d) ease-out forwards;
    }

    @keyframes fireworkShot {
      0% { transform: scale(0.1); opacity: 1; }
      60% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* 画面中央に大きく表示されるキャラクター */
    #character-display {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 8px 10px;
      border-radius: 24px;
      background: transparent;
      box-shadow: none;
      line-height: 1;
      transform: scale(0);
      transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      pointer-events: none; /* タップの邪魔にならないようにする */
      max-width: min(88vw, 320px);
      text-align: center;
    }

    #emoji-char {
      font-size: 120px;
      line-height: 1;
      display: block;
      margin: 0;
    }

    #item-name {
      font-size: 28px;
      color: #333;
      font-weight: 700;
      font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      margin-top: 8px;
    }

    /* 飛び出すアニメーション */
    .pop-in {
      animation: popInAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popInAnim {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* 画面をタップしたときに出る星やシャボン玉のエフェクト */
    .particle {
      position: absolute;
      font-size: 30px;
      pointer-events: none;
      animation: particleAnim 0.8s ease-out forwards;
      z-index: 5;
    }

    @keyframes particleAnim {
      0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; }
    }

    /* チャイルドロック用（フルスクリーン）ボタン */
    #lock-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: rgba(0, 0, 0, 0.3);
      z-index: 20;
    }
    
    /* 最初のスタート画面 */
    #start-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }
    #start-btn {
      font-size: 24px;
      padding: 15px 40px;
      background: #ff7e67;
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 8px 15px rgba(255, 126, 103, 0.4);
    }
  </style>
</head>
<body>

  <!-- スタート画面（Web Audio APIの許可を得るため） -->
  <div id="start-screen">
    <h1 style="color: #ff7e67; margin-bottom: 30px;">タップでポン！</h1>
    <button id="start-btn">あそぶ</button>
  </div>

  <!-- フルスクリーン切り替えボタン（チャイルドロック用） -->
  <div id="lock-btn">📱</div>

  <!-- キャラクターが表示される場所 -->
  <div id="character-display">
    <span id="emoji-char">🎁</span>
    <div id="item-name">ぽん！</div>
  </div>

  <script>
    // キャラクターと背景色のリスト
    const items = [
      { emoji: '🚓', name: 'ぱとかー', category: 'vehicle', color: '#e6e6fa' },
      { emoji: '🚓', name: 'ぱとかー', category: 'vehicle', color: '#e6e6fa' },
      { emoji: '🚓', name: 'ぱとかー', category: 'vehicle', color: '#e6e6fa' },
      { emoji: '🚑', name: 'きゅうきゅうしゃ', category: 'vehicle', color: '#f0f8ff' },
      { emoji: '🚑', name: 'きゅうきゅうしゃ', category: 'vehicle', color: '#f0f8ff' },
      { emoji: '🚒', name: 'しょうぼうしゃ', category: 'vehicle', color: '#ffe4e1' },
      { emoji: '🚒', name: 'しょうぼうしゃ', category: 'vehicle', color: '#ffe4e1' },
      { emoji: '🚌', name: 'ばす', category: 'vehicle', color: '#ffefd5' },
      { emoji: '🚌', name: 'ばす', category: 'vehicle', color: '#ffefd5' },
      { emoji: '🚜', name: 'とらくたー', category: 'vehicle', color: '#fffacd' },
      { emoji: '🚚', name: 'とらっく', category: 'vehicle', color: '#f5fffa' },
      { emoji: '🚗', name: 'くるま', category: 'vehicle', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', category: 'animal', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', category: 'animal', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', category: 'animal', color: '#e0ffff' },
      { emoji: '🐶', name: 'いぬ', category: 'animal', color: '#f5deb3' },
      { emoji: '🐶', name: 'いぬ', category: 'animal', color: '#f5deb3' },
      { emoji: '🐋', name: 'くじら', category: 'animal', color: '#d0f0c0' },
      { emoji: '🐙', name: 'たこ', category: 'animal', color: '#ffe4e1' },
      { emoji: '🐢', name: 'かめ', category: 'animal', color: '#e6ffe6' },
      { emoji: '🐄', name: 'うし', category: 'animal', color: '#fff8dc' },
      { emoji: '🐸', name: 'かえる', category: 'animal', color: '#e0ffe0' },
      { emoji: '🐼', name: 'ぱんだ', category: 'animal', color: '#f0f8ff' },
      { emoji: '🥕', name: 'にんじん', category: 'vegetable', color: '#fff5ee' },
      { emoji: '🥕', name: 'にんじん', category: 'vegetable', color: '#fff5ee' },
      { emoji: '🥦', name: 'ぶろっこりー', category: 'vegetable', color: '#f5fff5' },
      { emoji: '🥬', name: 'きゃべつ', category: 'vegetable', color: '#f0fff0' },
      { emoji: '🥔', name: 'じゃがいも', category: 'vegetable', color: '#fff8dc' },
      { emoji: '🧅', name: 'たまねぎ', category: 'vegetable', color: '#fff0f5' },
      { emoji: '🫑', name: 'ぴーまん', category: 'vegetable', color: '#f0fff0' },
      { emoji: '🍌', name: 'ばなな', category: 'fruit', color: '#ffffe0' },
      { emoji: '🍌', name: 'ばなな', category: 'fruit', color: '#ffffe0' },
      { emoji: '🍉', name: 'すいか', category: 'fruit', color: '#ffe4e1' },
      { emoji: '🍉', name: 'すいか', category: 'fruit', color: '#ffe4e1' },
      { emoji: '🍎', name: 'りんご', category: 'fruit', color: '#ffe4e1' },
      { emoji: '🍓', name: 'いちご', category: 'fruit', color: '#ffe4f0' }
    ];

    const particles = ['✨', '🎵', '🫧', '⭐', '🎈'];
    const fireworksChance = 0.05;
    let audioCtx;
    let japaneseVoice = null;

    function updateJapaneseVoice() {
      const voices = speechSynthesis.getVoices();
      japaneseVoice = voices.find(v => v.lang === 'ja-JP' && /Haruka|Kyoko|Mei|Aoi|Sayaka|Sakura|Hikari|Yui|Miku/.test(v.name)) ||
                     voices.find(v => v.lang === 'ja-JP') ||
                     voices.find(v => v.lang && v.lang.startsWith('ja')) ||
                     null;
    }

    if (window.speechSynthesis) {
      updateJapaneseVoice();
      speechSynthesis.onvoiceschanged = updateJapaneseVoice;
    }

    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const characterDisplay = document.getElementById('character-display');
    const emojiChar = document.getElementById('emoji-char');
    const itemName = document.getElementById('item-name');
    const lockBtn = document.getElementById('lock-btn');

    // はじめるボタンの処理（音を鳴らす準備）
    startBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      startScreen.style.display = 'none';
      characterDisplay.style.transform = 'scale(1)'; // 最初はプレゼント箱
    });

    // 画面のどこかをタップしたときの処理
    document.body.addEventListener('pointerdown', (e) => {
      if (startScreen.style.display !== 'none') return;
      if (e.target === lockBtn) return;

      // ランダムにキャラクターを選ぶ
      const randomItem = items[Math.floor(Math.random() * items.length)];
      
      // キャラクターと背景色を変更
      emojiChar.textContent = randomItem.emoji;
      itemName.textContent = randomItem.name;
      document.body.style.backgroundColor = randomItem.color;

      const isFireworks = Math.random() < fireworksChance;
      if (isFireworks) {
        triggerFireworks();
      }

      // アニメーションをリセットして再再生
      characterDisplay.classList.remove('pop-in');
      void characterDisplay.offsetWidth; // リフローを強制してアニメーションをリセット
      characterDisplay.classList.add('pop-in');

      // 音を鳴らす
      playSound(randomItem.category, isFireworks);

      // ひらがなを読み上げる
      speakJapanese(randomItem.name);

      // エフェクトを出す
      createParticles(e.clientX, e.clientY);
    });

    // 楽しい音を生成する処理（Web Audio API）
    function playSound(category, fireworks) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      if (fireworks) {
        playFanfare();
        return;
      }

      switch (category) {
        case 'vehicle':
          playVehicleSound();
          break;
        case 'vegetable':
        case 'fruit':
          playCutePoko();
          break;
        case 'animal':
          playAnimalSound();
          break;
        default:
          playDefaultSound();
      }
    }

    function playVehicleSound() {
      const now = audioCtx.currentTime;
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gainNode = audioCtx.createGain();
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc1.type = 'sine';
      osc2.type = 'triangle';
      osc1.frequency.setValueAtTime(110, now);
      osc2.frequency.setValueAtTime(176, now);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(650, now);
      filter.Q.setValueAtTime(4, now);
      gainNode.gain.setValueAtTime(0.001, now);
      gainNode.gain.linearRampToValueAtTime(0.25, now + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
      filter.frequency.linearRampToValueAtTime(420, now + 0.25);
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.45);
      osc2.stop(now + 0.45);
    }

    function playCutePoko() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gainNode = audioCtx.createGain();
      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(640, now);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(900, now);
      filter.Q.setValueAtTime(1.2, now);
      gainNode.gain.setValueAtTime(0.001, now);
      gainNode.gain.linearRampToValueAtTime(0.18, now + 0.04);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
      osc.start(now);
      osc.stop(now + 0.32);
    }

    function playAnimalSound() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.linearRampToValueAtTime(880, now + 0.25);
      gainNode.gain.setValueAtTime(0.001, now);
      gainNode.gain.exponentialRampToValueAtTime(0.35, now + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    }

    function playDefaultSound() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      gainNode.gain.setValueAtTime(0.001, now);
      gainNode.gain.exponentialRampToValueAtTime(0.3, now + 0.03);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    function playFanfare() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 880.00];
      notes.forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = index === 0 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, now + index * 0.08);
        gainNode.gain.setValueAtTime(0.001, now + index * 0.08);
        gainNode.gain.linearRampToValueAtTime(0.18, now + index * 0.08 + 0.04);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.45);
        osc.start(now + index * 0.08);
        osc.stop(now + index * 0.08 + 0.45);
      });
    }

    function triggerFireworks() {
      document.body.classList.add('fireworks-active');
      createFireworks();
      setTimeout(() => {
        document.body.classList.remove('fireworks-active');
      }, 1200);
    }

    function createFireworks() {
      for (let i = 0; i < 8; i++) {
        const shot = document.createElement('div');
        shot.className = 'firework-shot';
        shot.style.left = `${10 + Math.random() * 80}%`;
        shot.style.top = `${10 + Math.random() * 70}%`;
        shot.style.setProperty('--s', `${80 + Math.random() * 80}px`);
        shot.style.setProperty('--d', `${0.9 + Math.random() * 0.4}s`);
        shot.style.background = `radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(${180 + Math.random()*70},${120 + Math.random()*90},${220 + Math.random()*35},0.85) 60%, transparent 90%)`;
        document.body.appendChild(shot);
        setTimeout(() => shot.remove(), 1200);
      }
    }

    function speakJapanese(text) {
      if (!window.speechSynthesis) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      utterance.volume = 0.92;
      if (japaneseVoice) {
        utterance.voice = japaneseVoice;
      }
      utterance.onstart = () => {
        // 少し自然なリズムにするために開始前にキャンセルは行わない
      };
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    // キラキラエフェクトを作る処理
    function createParticles(x, y) {
      for (let i = 0; i < 5; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = particles[Math.floor(Math.random() * particles.length)];
        
        // タップした位置に配置
        particle.style.left = `${x - 15}px`;
        particle.style.top = `${y - 15}px`;

        // 飛び散る方向をランダムに計算
        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 100;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        
        particle.style.setProperty('--tx', `${tx}px`);
        particle.style.setProperty('--ty', `${ty}px`);

        document.body.appendChild(particle);

        // アニメーションが終わったら消す
        setTimeout(() => {
          particle.remove();
        }, 800);
      }
    }

    // チャイルドロック（フルスクリーン化）機能
    // 右上のボタンを長押し(約1秒)で全画面表示になり、スマホの戻るボタンなどを押しにくくします
    let lockTimer;
    lockBtn.addEventListener('pointerdown', () => {
      lockTimer = setTimeout(() => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => console.log(err));
          lockBtn.style.color = "red"; // ロック中アピール
        } else {
          document.exitFullscreen();
          lockBtn.style.color = "rgba(0,0,0,0.3)";
        }
      }, 1000); // 1秒長押し
    });
    lockBtn.addEventListener('pointerup', () => clearTimeout(lockTimer));
    lockBtn.addEventListener('pointerleave', () => clearTimeout(lockTimer));
  </script>
</body>
</html>
