<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>タップでポン！</title>
  <style>
    /* 画面の基本設定（誤操作やテキスト選択を防止） */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fdf5e6;
      transition: background-color 0.3s ease;
      touch-action: none; /* ダブルタップズームなどを無効化 */
      -webkit-user-select: none;
      user-select: none;
      font-family: sans-serif;
    }

    /* 画面中央に大きく表示されるキャラクター */
    #character-display {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 24px;
      background: transparent;
      box-shadow: none;
      line-height: 1;
      transform: scale(0);
      transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      pointer-events: none; /* タップの邪魔にならないようにする */
      max-width: min(88vw, 320px);
      text-align: center;
    }

    #emoji-char {
      font-size: 120px;
      line-height: 1;
      display: block;
      margin: 0;
    }

    #item-name {
      font-size: 28px;
      color: #333;
      font-weight: 700;
      font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      margin-top: 8px;
    }

    /* 飛び出すアニメーション */
    .pop-in {
      animation: popInAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popInAnim {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* 画面をタップしたときに出る星やシャボン玉のエフェクト */
    .particle {
      position: absolute;
      font-size: 30px;
      pointer-events: none;
      animation: particleAnim 0.8s ease-out forwards;
      z-index: 5;
    }

    @keyframes particleAnim {
      0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; }
    }

    /* チャイルドロック用（フルスクリーン）ボタン */
    #lock-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: rgba(0, 0, 0, 0.3);
      z-index: 20;
    }
    
    /* 最初のスタート画面 */
    #start-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }
    #start-btn {
      font-size: 24px;
      padding: 15px 40px;
      background: #ff7e67;
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 8px 15px rgba(255, 126, 103, 0.4);
    }
  </style>
</head>
<body>

  <!-- スタート画面（Web Audio APIの許可を得るため） -->
  <div id="start-screen">
    <h1 style="color: #ff7e67; margin-bottom: 30px;">タップでポン！</h1>
    <button id="start-btn">あそぶ</button>
  </div>

  <!-- フルスクリーン切り替えボタン（チャイルドロック用） -->
  <div id="lock-btn">📱</div>

  <!-- キャラクターが表示される場所 -->
  <div id="character-display">
    <span id="emoji-char">🎁</span>
    <div id="item-name">ぽん！</div>
  </div>

  <script>
    // キャラクターと背景色のリスト
    const items = [
      { emoji: '🚓', name: 'ぱとかー', color: '#e6e6fa' },
      { emoji: '🚓', name: 'ぱとかー', color: '#e6e6fa' },
      { emoji: '🚓', name: 'ぱとかー', color: '#e6e6fa' },
      { emoji: '🚑', name: 'きゅうきゅうしゃ', color: '#f0f8ff' },
      { emoji: '🚑', name: 'きゅうきゅうしゃ', color: '#f0f8ff' },
      { emoji: '🚒', name: 'しょうぼうしゃ', color: '#ffe4e1' },
      { emoji: '🚒', name: 'しょうぼうしゃ', color: '#ffe4e1' },
      { emoji: '🚌', name: 'ばす', color: '#ffefd5' },
      { emoji: '🚌', name: 'ばす', color: '#ffefd5' },
      { emoji: '🚜', name: 'とらくたー', color: '#fffacd' },
      { emoji: '🚚', name: 'とらっく', color: '#f5fffa' },
      { emoji: '🚗', name: 'くるま', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', color: '#e0ffff' },
      { emoji: '🐧', name: 'ぺんぎん', color: '#e0ffff' },
      { emoji: '🐶', name: 'いぬ', color: '#f5deb3' },
      { emoji: '🐶', name: 'いぬ', color: '#f5deb3' },
      { emoji: '🐋', name: 'くじら', color: '#d0f0c0' },
      { emoji: '🐙', name: 'たこ', color: '#ffe4e1' },
      { emoji: '🐢', name: 'かめ', color: '#e6ffe6' },
      { emoji: '🐄', name: 'うし', color: '#fff8dc' },
      { emoji: '🐸', name: 'かえる', color: '#e0ffe0' },
      { emoji: '🐼', name: 'ぱんだ', color: '#f0f8ff' },
      { emoji: '🥕', name: 'にんじん', color: '#fff5ee' },
      { emoji: '🥕', name: 'にんじん', color: '#fff5ee' },
      { emoji: '🥦', name: 'ぶろっこりー', color: '#f5fff5' },
      { emoji: '🥬', name: 'きゃべつ', color: '#f0fff0' },
      { emoji: '🥔', name: 'じゃがいも', color: '#fff8dc' },
      { emoji: '🧅', name: 'たまねぎ', color: '#fff0f5' },
      { emoji: '🫑', name: 'ぴーまん', color: '#f0fff0' },
      { emoji: '🍌', name: 'ばなな', color: '#ffffe0' },
      { emoji: '🍌', name: 'ばなな', color: '#ffffe0' },
      { emoji: '🍉', name: 'すいか', color: '#ffe4e1' },
      { emoji: '🍉', name: 'すいか', color: '#ffe4e1' },
      { emoji: '🍎', name: 'りんご', color: '#ffe4e1' },
      { emoji: '🍓', name: 'いちご', color: '#ffe4f0' }
    ];

    const particles = ['✨', '🎵', '🫧', '⭐', '🎈'];
    let audioCtx;

    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const characterDisplay = document.getElementById('character-display');
    const emojiChar = document.getElementById('emoji-char');
    const itemName = document.getElementById('item-name');
    const lockBtn = document.getElementById('lock-btn');

    // はじめるボタンの処理（音を鳴らす準備）
    startBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      startScreen.style.display = 'none';
      characterDisplay.style.transform = 'scale(1)'; // 最初はプレゼント箱
    });

    // 画面のどこかをタップしたときの処理
    document.body.addEventListener('pointerdown', (e) => {
      if (startScreen.style.display !== 'none') return;
      if (e.target === lockBtn) return;

      // ランダムにキャラクターを選ぶ
      const randomItem = items[Math.floor(Math.random() * items.length)];
      
      // キャラクターと背景色を変更
      emojiChar.textContent = randomItem.emoji;
      itemName.textContent = randomItem.name;
      document.body.style.backgroundColor = randomItem.color;

      // アニメーションをリセットして再再生
      characterDisplay.classList.remove('pop-in');
      void characterDisplay.offsetWidth; // リフローを強制してアニメーションをリセット
      characterDisplay.classList.add('pop-in');

      // 音を鳴らす
      playSound();

      // エフェクトを出す
      createParticles(e.clientX, e.clientY);
    });

    // 楽しい音を生成する処理（Web Audio API）
    function playSound() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // 適当に叩いても音楽のように聞こえるドレミファソラシドの周波数
      const notes = [261.63, 329.63, 392.00, 523.25, 659.25]; // ペンタトニックスケール
      const randomNote = notes[Math.floor(Math.random() * notes.length)];

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      // コロコロとした丸い音（サイン波）
      osc.type = 'sine';
      osc.frequency.setValueAtTime(randomNote, audioCtx.currentTime);
      
      // 音量調整（フェードアウトさせてポン！という感じに）
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    // キラキラエフェクトを作る処理
    function createParticles(x, y) {
      for (let i = 0; i < 5; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = particles[Math.floor(Math.random() * particles.length)];
        
        // タップした位置に配置
        particle.style.left = `${x - 15}px`;
        particle.style.top = `${y - 15}px`;

        // 飛び散る方向をランダムに計算
        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 100;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        
        particle.style.setProperty('--tx', `${tx}px`);
        particle.style.setProperty('--ty', `${ty}px`);

        document.body.appendChild(particle);

        // アニメーションが終わったら消す
        setTimeout(() => {
          particle.remove();
        }, 800);
      }
    }

    // チャイルドロック（フルスクリーン化）機能
    // 右上のボタンを長押し(約1秒)で全画面表示になり、スマホの戻るボタンなどを押しにくくします
    let lockTimer;
    lockBtn.addEventListener('pointerdown', () => {
      lockTimer = setTimeout(() => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => console.log(err));
          lockBtn.style.color = "red"; // ロック中アピール
        } else {
          document.exitFullscreen();
          lockBtn.style.color = "rgba(0,0,0,0.3)";
        }
      }, 1000); // 1秒長押し
    });
    lockBtn.addEventListener('pointerup', () => clearTimeout(lockTimer));
    lockBtn.addEventListener('pointerleave', () => clearTimeout(lockTimer));
  </script>
</body>
</html>
