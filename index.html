<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF13風おみくじ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(circle at top, rgba(255,235,255,0.25), transparent 25%),
                        linear-gradient(180deg, #0b0f1f 0%, #131929 35%, #1f2340 100%);
            color: #f5f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(162,155,254,0.18), transparent 16%),
                              radial-gradient(circle at 80% 10%, rgba(255,120,200,0.14), transparent 14%);
            pointer-events: none;
        }
        .card {
            position: relative;
            background: rgba(18, 22, 44, 0.92);
            border: 1px solid rgba(178, 155, 255, 0.22);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 20px 40px rgba(0,0,0,0.35);
            backdrop-filter: blur(14px);
            padding: 34px;
            border-radius: 28px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            z-index: 1;
        }
        .card::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 32px;
            background: linear-gradient(135deg, rgba(147, 186, 255, 0.15), rgba(255, 109, 215, 0.12));
            filter: blur(20px);
            z-index: -1;
        }
        h1 {
            color: #e1d9ff;
            font-size: 26px;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        p {
            color: #c9c1ef;
            margin: 0 0 24px;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #7b5bff 0%, #ff8ce0 100%);
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.24s ease, box-shadow 0.24s ease;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: 0 14px 30px rgba(123, 91, 255, 0.22);
        }
        button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 18px 38px rgba(123, 91, 255, 0.32);
        }
        #result {
            margin-top: 28px;
            font-size: 20px;
            font-weight: 700;
            color: #ffecbf;
            min-height: 40px;
            text-shadow: 0 0 12px rgba(255, 210, 155, 0.35);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔮 本日のバイブス占い</h1>
    <p>今のあなたの運勢と、AIからのメッセージを届けます！</p>
    <button onclick="getVibe()">占う！</button>
    <div id="result"></div>
</div>

<script>
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playFantasiaFanfare() {
        const now = audioContext.currentTime;
        const masterGain = audioContext.createGain();
        masterGain.connect(audioContext.destination);
        masterGain.gain.setValueAtTime(0.3, now);
        masterGain.gain.exponentialRampToValueAtTime(0.01, now + 2.5);

        // FF風ファンファーレのメロディーと和音
        const notes = [
            { freq: 587.33, start: 0, duration: 0.2, type: 'sine' },      // D5
            { freq: 659.25, start: 0.15, duration: 0.2, type: 'sine' },   // E5
            { freq: 739.99, start: 0.3, duration: 0.2, type: 'sine' },    // F#5
            { freq: 783.99, start: 0.45, duration: 0.35, type: 'sine' },  // G5
            { freq: 659.25, start: 0.6, duration: 0.2, type: 'sine' },    // E5
            { freq: 783.99, start: 0.75, duration: 0.2, type: 'sine' },   // G5
            { freq: 987.77, start: 0.9, duration: 0.45, type: 'sine' },   // B5
        ];

        // 和音レイヤー（奥行き感）
        const chords = [
            { freq: 293.66, start: 0, duration: 0.65 },                   // D4
            { freq: 349.23, start: 0.65, duration: 0.65 },                // F4
            { freq: 391.99, start: 1.3, duration: 0.65 },                 // G4
            { freq: 493.88, start: 1.95, duration: 0.55 },                // B4
        ];

        // メロディーレイヤー
        notes.forEach(note => {
            const osc = audioContext.createOscillator();
            osc.type = note.type;
            osc.frequency.setValueAtTime(note.freq, now + note.start);
            const env = audioContext.createGain();
            env.gain.setValueAtTime(0.4, now + note.start);
            env.gain.exponentialRampToValueAtTime(0.05, now + note.start + note.duration);
            osc.connect(env);
            env.connect(masterGain);
            osc.start(now + note.start);
            osc.stop(now + note.start + note.duration);
        });

        // 和音レイヤー
        chords.forEach(chord => {
            const osc = audioContext.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(chord.freq, now + chord.start);
            const env = audioContext.createGain();
            env.gain.setValueAtTime(0.2, now + chord.start);
            env.gain.exponentialRampToValueAtTime(0.02, now + chord.start + chord.duration);
            osc.connect(env);
            env.connect(masterGain);
            osc.start(now + chord.start);
            osc.stop(now + chord.start + chord.duration);
        });

        // キラキラエフェクト用の高周波レイヤー
        const shimmerFreqs = [1318.51, 1397.99, 1567.98];
        shimmerFreqs.forEach((freq, i) => {
            const osc = audioContext.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.15);
            const env = audioContext.createGain();
            env.gain.setValueAtTime(0.15, now + i * 0.15);
            env.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
            osc.connect(env);
            env.connect(masterGain);
            osc.start(now + i * 0.15);
            osc.stop(now + i * 0.15 + 0.3);
        });
    }

    function getVibe() {
        playFantasiaFanfare();
        
        const fortunes = [
            "超大吉 🌈「光の戦士の祝福が降り注ぐ。今日の冒険はすべて成功する！」",
            "大吉 🌟「最高潮！今すぐ何かコードを書き始めよう！」",
            "中吉 🎉「良い波が来てます。直感を信じて進め！」",
            "吉 👍「一歩ずつ進めば大丈夫。VS Codeを開いただけで天才！」",
            "バイブス満タン 🔥「作れないものはない！AIを使い倒そう！」"
        ];
        const randomIndex = Math.floor(Math.random() * fortunes.length);
        document.getElementById("result").innerText = fortunes[randomIndex];
    }
</script>

</body>
</html>
